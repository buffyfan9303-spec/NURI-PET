<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08090a" />
    <meta name="description" content="NURI PET — 펫 서비스 사업자용 통합 운영 OS + 보호자 컨디션 기록 앱" />
    <title>NURI PET · 펫 통합 OS</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <script>
      // Apply theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var p = localStorage.getItem('nuripet-theme') || 'dark'
          var dark = p === 'dark' || (p === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.add(dark ? 'dark' : 'light')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
